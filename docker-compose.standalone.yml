services:
  wuzapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wuzapi
    ports:
      - "${WUZAPI_PORT:-8080}:8080"
    environment:
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN}
      - WUZAPI_GLOBAL_ENCRYPTION_KEY=${WUZAPI_GLOBAL_ENCRYPTION_KEY}
      - WUZAPI_GLOBAL_HMAC_KEY=${WUZAPI_GLOBAL_HMAC_KEY:-}
      - WUZAPI_GLOBAL_WEBHOOK=${WUZAPI_GLOBAL_WEBHOOK:-}
      - TZ=${TZ:-America/Sao_Paulo}
      - WEBHOOK_FORMAT=${WEBHOOK_FORMAT:-json}
      - SESSION_DEVICE_NAME=${SESSION_DEVICE_NAME:-WuzAPI}
      - WEBHOOK_RETRY_ENABLED=${WEBHOOK_RETRY_ENABLED:-true}
      - WEBHOOK_RETRY_COUNT=${WEBHOOK_RETRY_COUNT:-2}
      - WEBHOOK_RETRY_DELAY_SECONDS=${WEBHOOK_RETRY_DELAY_SECONDS:-30}
      - WEBHOOK_ERROR_QUEUE_NAME=${WEBHOOK_ERROR_QUEUE_NAME:-wuzapi_dead_letter_webhooks}
      # Optional RabbitMQ integration:
      # - RABBITMQ_URL=amqp://user:password@rabbitmq:5672/
      # - RABBITMQ_QUEUE=whatsapp_events
    volumes:
      - wuzapi_data:/data
    restart: unless-stopped

volumes:
  wuzapi_data:
